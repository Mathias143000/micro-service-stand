<!doctype html>
<html lang="en">
  <head>

    <title>RomanEstate Internal Console</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #111827;

        padding: 40px 24px;
      }
      .panel {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;

        color: #67e8f9;
        text-decoration: none;
      }

        margin: 10px 0;
      }

  <body>
    <section class="panel">
      <h1>Internal Operations Console</h1>
      <p>Use this lightweight internal page to jump straight into service state and platform signals.</p>
      <ul>
        <li><a href="/api/notifications/events">Notification events</a></li>
        <li><a href="/api/listings/stats">Listing stats</a></li>
        <li><a href="/api/deals/stats">Deal stats</a></li>
        <li><a href="/api/profile/stats">Profile stats</a></li>
