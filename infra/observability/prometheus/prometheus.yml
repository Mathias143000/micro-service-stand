global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:8081

  - job_name: listing-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - listing-service:8082

  - job_name: deal-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - deal-service:8083

  - job_name: profile-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - profile-service:8084

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-service:8085

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
