spring.application.name=auth-service

server.port=${SERVER_PORT:8081}

app.jwt.secret=${APP_JWT_SECRET:0123456789abcdef0123456789abcdef}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:1440}
app.demo-users.enabled=${APP_DEMO_USERS_ENABLED:true}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8088,http://127.0.0.1:8088}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/realestate}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.error.include-message=always
server.error.include-binding-errors=always

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=actuator-health
management.endpoints.web.path-mapping.info=info
management.endpoints.web.path-mapping.prometheus=metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState,ping
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} level=%-5level trace=%X{traceId:-} span=%X{spanId:-} logger=%logger{36} msg=%msg%n
