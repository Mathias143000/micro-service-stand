name: service-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax
        run: python -m py_compile app/server.py tests/test_service.py
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Docker build
        run: docker build -t service-template .
