spring.datasource.url=jdbc:postgresql://localhost:5433/realestate?currentSchema=marketplace_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=marketplace_test
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:test-schema.sql
app.jwt.secret=0123456789abcdef0123456789abcdef
app.jwt.expiration-minutes=1440
app.files.storage-dir=./target/test-uploads
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
server.error.include-message=always
server.error.include-binding-errors=always
