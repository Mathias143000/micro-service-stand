# --- Server ---
server.port=8080

# --- JWT (ОБЯЗАТЕЛЬНО, иначе падение как у тебя) ---
app.jwt.secret=0123456789abcdef0123456789abcdef
app.jwt.expiration-minutes=1440

# --- Database (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/realestate
spring.datasource.username=postgres
spring.datasource.password=postgres


# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- FILES STORAGE ---
app.files.storage-dir=./uploads

# --- DEMO USERS ---
app.demo-users.enabled=true

# --- Logging: show actual MVC mappings ---
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# --- Errors: include message in JSON (for debugging) ---
server.error.include-message=always
server.error.include-binding-errors=always

# --- Actuator health/readiness ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Structured logging defaults ---
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} level=%-5level trace=%X{traceId:-} span=%X{spanId:-} logger=%logger{36} msg=%msg%n
